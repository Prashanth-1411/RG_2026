services:
  - type: web
    name: rg-ambulance
    env: php
    plan: free
    buildCommand: composer install --optimize-autoloader --no-dev --no-interaction && php artisan storage:link && php artisan event:cache && php artisan config:cache && php artisan route:cache && php artisan view:cache
    postDeployCommand: php artisan migrate --force
    envVars:
      - key: APP_NAME
        value: R.G. Ambulance Service
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://rg-ambulance.onrender.com
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: YOUR_MYSQL_HOST
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        value: YOUR_DATABASE
      - key: DB_USERNAME
        value: YOUR_USERNAME
      - key: DB_PASSWORD
        value: YOUR_PASSWORD
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_CHANNEL
        value: stderr
      - key: APP_MAINTENANCE_DRIVER
        value: file
